<script>
(function () {
  "use strict";

  /* ================= Geometry constants (canonical master) ================= */
  var WATER_Y = 270;        // gold waterline (top of Available Capacity)
  var VESSEL_BOTTOM = 650;  // inside bottom of the vessel
  var CANON_STRAIN = 468;   // the canonical Strain Line™ position
  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* Placeholder link — REPLACE with the real Bandwidth Compass™ URL when live. */
  var COMPASS_URL = "#bandwidth-compass"; /* TODO(Samone): real destination */

  var $ = function (id) { return document.getElementById(id); };

  /* ================= Reservoir renderer =================
     One numeric drives the picture: strainY — the boundary between
     Available Capacity (gold, WATER_Y..strainY) and the Bandwidth Tax™
     (hatched, strainY..VESSEL_BOTTOM). strainY === VESSEL_BOTTOM means no tax. */
  function ribbonPath(strainY) {
    /* Canonical parametrization: start depth ≈ 40% into the gold band;
       thickness scales with the band (26 units at the canonical band height). */
    var h = strainY - WATER_Y;
    if (h <= 10) return "";
    var a = WATER_Y + 0.404 * h;
    var t = Math.max(5, 26 * h / 198);
    var b = a + t;
    function r(n) { return Math.round(n * 10) / 10; }
    return "M623," + r(a) + " C695," + r(a + 5) + " 745," + r(a + 53) + " 793," + r(a + 131) +
           " C751," + r(a + 79) + " 703," + r(a + 43) + " 623," + r(b) + " Z";
  }

  function setGeometry(strainY) {
    $("goldBand").setAttribute("y", WATER_Y);
    $("goldBand").setAttribute("height", Math.max(0, strainY - WATER_Y));
    $("taxLayer").setAttribute("y", strainY);
    $("taxLayer").setAttribute("height", Math.max(0, VESSEL_BOTTOM - strainY));
    $("strainLine").setAttribute("y1", strainY);
    $("strainLine").setAttribute("y2", strainY);
    $("ribbon").setAttribute("d", ribbonPath(strainY));
    /* annotation positions track the boundary */
    var capMid = (WATER_Y + strainY) / 2;
    $("capT1").setAttribute("y", capMid - 4);
    $("capT2").setAttribute("y", capMid + 13);
    $("capTick").setAttribute("y1", capMid + 4);
    $("capTick").setAttribute("y2", capMid + 4);
    $("strainT").setAttribute("y", strainY - 8);
    var taxMid = (strainY + VESSEL_BOTTOM) / 2;
    $("taxT1").setAttribute("y", taxMid - 2);
    $("taxT2").setAttribute("y", taxMid + 15);
    $("taxTick").setAttribute("y1", taxMid + 4);
    $("taxTick").setAttribute("y2", taxMid + 4);
    var h = strainY - WATER_Y;
    var endY = (WATER_Y + 0.404 * h) + 131;
    $("folT1").setAttribute("y", endY + 8);
    $("folT2").setAttribute("y", endY + 26);
  }

  var currentStrainY = VESSEL_BOTTOM;
  var tweenToken = 0; /* increments per tween; stale frames abort */
  function tweenStrain(toY, done) {
    var token = ++tweenToken;
    /* Reduced motion: jump straight to the final state. */
    if (reducedMotion) { currentStrainY = toY; setGeometry(toY); if (done) done(); return; }
    var fromY = currentStrainY, t0 = null, DUR = 650, finished = false;
    function finish() {
      if (finished || token !== tweenToken) return;
      finished = true;
      currentStrainY = toY; setGeometry(toY);
      if (done) done();
    }
    function ease(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
    function frame(ts) {
      if (finished || token !== tweenToken) return; /* superseded by a newer tween */
      if (t0 === null) t0 = ts;
      var p = Math.min(1, (ts - t0) / DUR);
      setGeometry(fromY + (toY - fromY) * ease(p));
      if (p < 1) { requestAnimationFrame(frame); } else { finish(); }
    }
    requestAnimationFrame(frame);
    /* Guaranteed completion: if rAF is throttled or starved (backgrounded tab,
       embedded webview), snap to the final state so the picture is never stale. */
    setTimeout(finish, DUR + 120);
  }

  function show(id, on) {
    var el = $(id);
    el.classList.toggle("off", !on);
    if (el.getAttribute("aria-hidden") !== null) el.setAttribute("aria-hidden", on ? "false" : "true");
  }

  /* Apply a full visual state: which layers/labels are visible + boundary position. */
  function updateReservoir(v) {
    show("g-inlets", v.inlets);
    show("goldBand", v.gold);
    show("waterline", v.gold);
    show("taxLayer", v.tax);
    show("strainLine", v.line);
    show("ribbon", v.ribbon);
    show("lab-fullcap", v.labels.indexOf("fullcap") >= 0);
    show("lab-capacity", v.labels.indexOf("capacity") >= 0);
    show("lab-strain", v.labels.indexOf("strain") >= 0);
    show("lab-tax", v.labels.indexOf("tax") >= 0);
    show("lab-follow", v.labels.indexOf("follow") >= 0);
    tweenStrain(v.strainY);
  }

  /* ================= Stage configuration =================
     Copy is fixed by the approved spec; the teaching sequence is frozen. */
  var STAGES = [
    { id: "opening", kick: "", visual: { inlets: false, gold: false, tax: false, line: false, ribbon: false, labels: [], strainY: VESSEL_BOTTOM },
      html: '<p class="lead">Have you ever wondered why some days you can handle everything, while on other days the smallest thing feels like too much?</p>' +
            '<p>The answer is not always motivation. Sometimes it is capacity.</p>',
      actions: '<div class="cta-row"><button class="btn gold" id="btnBuild" type="button">Build the framework</button></div>' },

    { id: "reservoir", kick: "Stage 1 · The Reservoir", visual: { inlets: false, gold: false, tax: false, line: false, ribbon: false, labels: ["fullcap"], strainY: VESSEL_BOTTOM },
      html: '<h2>Imagine your life as a reservoir.</h2>' +
            '<p>It represents the usable capacity available to you right now.</p>' },

    { id: "systems", kick: "Stage 2 · The Four Life Systems", visual: { inlets: true, gold: false, tax: false, line: false, ribbon: false, labels: ["fullcap"], strainY: VESSEL_BOTTOM },
      html: '<h2>Money · Time · Well-being · Environment</h2>' +
            '<p>Every day, your Money, Time, Well-being, and Environment either support your capacity or quietly draw from it.</p>' +
            '<p class="note">The four systems are framework components, not separate products or isolated categories.</p>' },

    { id: "capacity", kick: "Stage 3 · Available Capacity", visual: { inlets: true, gold: true, tax: false, line: false, ribbon: false, labels: ["fullcap", "capacity"], strainY: VESSEL_BOTTOM },
      html: '<h2>Available Capacity</h2>' +
            '<p>This is the capacity you can actually use right now.</p>' +
            '<p class="note">Not simply energy, time, or motivation — the usable capacity your systems currently sustain.</p>' },

    { id: "symptom", kick: "Stage 4 · The Visible Symptom", visual: { inlets: true, gold: true, tax: false, line: false, ribbon: true, labels: ["fullcap", "capacity", "follow"], strainY: VESSEL_BOTTOM },
      html: '<h2>Follow-through</h2>' +
            '<p>When follow-through drops, we often blame discipline, motivation, or character.</p>' +
            '<p>But the visible struggle may not be the real problem.</p>' +
            '<p class="note">Follow-through flows out of Available Capacity. It is the outcome the system protects — not a measure of willpower.</p>' },

    { id: "tax", kick: "Stage 5 · The Bandwidth Tax™", visual: { inlets: true, gold: true, tax: true, line: false, ribbon: true, labels: ["fullcap", "capacity", "tax", "follow"], strainY: 520 },
      html: '<h2>Bandwidth Tax™</h2>' +
            '<p>Hidden strain can accumulate across your systems without being immediately visible. That hidden cost is the Bandwidth Tax™.</p>' },

    { id: "strainline", kick: "Stage 6 · The Strain Line™", visual: { inlets: true, gold: true, tax: true, line: true, ribbon: true, labels: ["fullcap", "capacity", "strain", "tax", "follow"], strainY: CANON_STRAIN },
      html: '<h2>The Strain Line™</h2>' +
            '<p>As hidden strain rises, the Strain Line™ rises with it.</p>' +
            '<p>Available Capacity shrinks, and consistent Follow-through becomes harder.</p>' +
            '<p class="note">The Strain Line™ is the readable boundary between usable capacity and hidden strain — not a score, a pass/fail threshold, or a mood indicator.</p>' },

    { id: "complete", kick: "The Completed Framework", visual: { inlets: true, gold: true, tax: true, line: true, ribbon: true, labels: ["fullcap", "capacity", "strain", "tax", "follow"], strainY: CANON_STRAIN },
      html: '<div class="reframe">The drop in follow-through was never a character flaw. It was a capacity problem — and capacity can be read, and reallocated.</div>' +
            '<div class="bigq">Where is your <span class="tm">Strain Line™</span>?</div>' +
            '<div class="arc">Diagnose · Stabilize · Reallocate</div>' +
            '<p class="distinct">The Bandwidth Tax™ Framework <em>explains</em> why capacity changes. The Bandwidth Compass™ <em>reveals</em> where hidden strain is occurring. The Bandwidth Reallocation Method™ <em>changes</em> what happens next.</p>',
      actions:
        '<div class="cta-row">' +
          '<button class="btn ghost" id="btnAgain" type="button">Explore again</button>' +
          '<a class="btn gold" id="btnCompass" href="#bandwidth-compass">Continue to the Bandwidth Compass™</a>' +
        '</div>' +
        '<div class="explorer">' +
          '<div class="xlab">See how strain changes the picture</div>' +
          '<div class="levels" role="group" aria-label="Illustrative strain levels">' +
            '<button class="lvl" data-strain="570" aria-pressed="false" type="button">Lower strain</button>' +
            '<button class="lvl" data-strain="' + CANON_STRAIN + '" aria-pressed="true" type="button">Rising strain</button>' +
            '<button class="lvl" data-strain="350" aria-pressed="false" type="button">High strain</button>' +
          '</div>' +
          '<div class="disclaim">This illustration shows how strain may affect capacity. It is not a personal diagnosis.</div>' +
        '</div>' }
  ];

  var stageIndex = 0;

  function updateProgress() {
    var el = $("progress");
    if (stageIndex === 0) { el.textContent = ""; return; }
    el.textContent = stageIndex + " of " + (STAGES.length - 1);
  }

  function renderStage() {
    var s = STAGES[stageIndex];
    $("stageKick").textContent = s.kick;
    $("stageCopy").innerHTML = s.html;
    $("stageActions").innerHTML = s.actions || "";
    updateReservoir(s.visual);
    updateProgress();
    $("btnPrev").disabled = (stageIndex === 0);
    $("btnNext").disabled = (stageIndex === STAGES.length - 1);
    /* wire per-stage buttons */
    var b = $("btnBuild");
    if (b) b.addEventListener("click", function () { go(1); });
    var again = $("btnAgain");
    if (again) again.addEventListener("click", restartExperience);
    var compass = $("btnCompass");
    if (compass) compass.setAttribute("href", COMPASS_URL); /* placeholder — see COMPASS_URL above */
    document.querySelectorAll(".lvl").forEach(function (btn) {
      btn.addEventListener("click", function () { setStrainLevel(btn); });
    });
  }

  function go(delta) {
    var next = Math.min(STAGES.length - 1, Math.max(0, stageIndex + delta));
    if (next === stageIndex) return;
    stageIndex = next;
    renderStage();
  }

  function restartExperience() {
    stageIndex = 0;
    renderStage();
  }

  /* Illustrative preset levels — teaching only; computes nothing about the viewer. */
  function setStrainLevel(btn) {
    document.querySelectorAll(".lvl").forEach(function (b) { b.setAttribute("aria-pressed", "false"); });
    btn.setAttribute("aria-pressed", "true");
    tweenStrain(parseFloat(btn.getAttribute("data-strain")));
  }

  /* ================= Navigation ================= */
  $("btnPrev").addEventListener("click", function () { go(-1); });
  $("btnNext").addEventListener("click", function () { go(1); });
  $("btnRestart").addEventListener("click", restartExperience);

  document.addEventListener("keydown", function (e) {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.key === "ArrowRight") { go(1); }
    else if (e.key === "ArrowLeft") { go(-1); }
    else if (e.key === "Home") { e.preventDefault(); restartExperience(); }
    else if (e.key === "End") { e.preventDefault(); stageIndex = STAGES.length - 1; renderStage(); }
    else if (e.key === "Escape") { /* reserved: closes optional help panel (none in this version) */ }
  });

  /* init */
  setGeometry(VESSEL_BOTTOM);
  renderStage();
})();
</script>
</body>
</html>
